grafana:
  enabled: true
  adminPassword: "Admin@123"

  persistence:
    enabled: false

  service:
    type: ClusterIP

  initChownData:
    enabled: false

  sidecar:
    dashboards:
      enabled: true
    datasources:
      enabled: true

  additionalDataSources:
    - name: Loki
      type: loki
      access: proxy
      url: http://loki:3100
      isDefault: false

    - name: Jaeger
      type: jaeger
      access: proxy
      url: http://jaeger-query:16686
      isDefault: false

prometheus:
  prometheusSpec:
    retention: 2d
    storageSpec: {}

alertmanager:
  enabled: true
  alertmanagerSpec:
    storage: {}

prometheusOperator:
  enabled: true

kubeStateMetrics:
  enabled: true

nodeExporter:
  enabled: true