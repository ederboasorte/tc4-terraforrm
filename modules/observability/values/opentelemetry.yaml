mode: deployment

image:
  repository: otel/opentelemetry-collector-contrib

service:
  enabled: true

ports:
  otlp:
    enabled: true
    containerPort: 4317
    servicePort: 4317
    protocol: TCP

  otlp-http:
    enabled: true
    containerPort: 4318
    servicePort: 4318
    protocol: TCP

  metrics:
    enabled: true
    containerPort: 8889
    servicePort: 8889
    protocol: TCP

config:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: ${env:MY_POD_IP}:4317
        http:
          endpoint: ${env:MY_POD_IP}:4318

  processors:
    batch: {}

  exporters:
    prometheus:
      endpoint: ${env:MY_POD_IP}:8889

    otlp/jaeger:
      endpoint: jaeger-collector:4317
      tls:
        insecure: true

    debug:
      verbosity: normal

  service:
    pipelines:
      metrics:
        receivers:
          - otlp
        processors:
          - batch
        exporters:
          - prometheus
          - debug

      traces:
        receivers:
          - otlp
        processors:
          - batch
        exporters:
          - otlp/jaeger
          - debug